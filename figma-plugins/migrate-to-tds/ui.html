<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: Inter, -apple-system, sans-serif;
    font-size: 12px;
    color: #333;
    padding: 16px;
    background: #fff;
  }
  h2 {
    font-size: 13px;
    font-weight: 600;
    margin-bottom: 16px;
  }
  .category {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    color: #888;
    margin-bottom: 8px;
  }
  .desc {
    color: #888;
    font-size: 11px;
    margin-top: 4px;
    line-height: 1.4;
  }
  .group {
    margin-bottom: 16px;
  }
  button {
    width: 100%;
    padding: 8px 12px;
    border: none;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  button:hover { opacity: 0.85; }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  button + button { margin-top: 6px; }
  .btn-primary {
    background: #171717;
    color: #fff;
  }
  .btn-danger {
    background: #F33939;
    color: #fff;
  }
  .btn-secondary {
    background: #3B82F6;
    color: #fff;
  }
  #status {
    margin-top: 12px;
    font-size: 11px;
    color: #666;
    min-height: 16px;
  }
</style>

<h2>TDS Migrator</h2>

<div class="group">
  <div class="category">Style Migration</div>
  <button id="btn-migrate" class="btn-primary" onclick="onMigrate()">Migrate</button>
  <div class="desc">Fill / Stroke / Effect / Text Style / fontFamily 교체</div>
</div>

<div class="group">
  <div class="category">Icon</div>
  <button id="btn-icons" class="btn-secondary" onclick="onBindIconColors()">Bind Icon Colors</button>
  <button id="btn-swap-icons" class="btn-secondary" onclick="onSwapIcons()">Swap Icon Sources</button>
</div>

<div class="group">
  <div class="category">Cleanup</div>
  <button id="btn-detach" class="btn-danger" onclick="onDetachEffects()">Remove Drop Shadow</button>
  <div class="desc">Button Drop Shadow 제거 (Ghost 제외)</div>
</div>

<div id="status"></div>

<script>
  function setStatus(msg) {
    document.getElementById('status').textContent = msg;
  }

  function setButtons(disabled) {
    document.getElementById('btn-migrate').disabled = disabled;
    document.getElementById('btn-icons').disabled = disabled;
    document.getElementById('btn-swap-icons').disabled = disabled;
    document.getElementById('btn-detach').disabled = disabled;
  }

  function onMigrate() {
    setStatus('Migrating...');
    setButtons(true);
    parent.postMessage({ pluginMessage: { type: 'migrate' } }, '*');
  }

  function onBindIconColors() {
    setStatus('Binding icon colors...');
    setButtons(true);
    parent.postMessage({ pluginMessage: { type: 'bind-icon-colors' } }, '*');
  }

  function onSwapIcons() {
    setStatus('Swapping icon sources...');
    setButtons(true);
    parent.postMessage({ pluginMessage: { type: 'swap-icons' } }, '*');
  }

  function onDetachEffects() {
    setStatus('Removing shadows...');
    setButtons(true);
    parent.postMessage({ pluginMessage: { type: 'detach-effects' } }, '*');
  }

  window.onmessage = function(event) {
    var msg = event.data.pluginMessage;
    if (msg && msg.type === 'result') {
      setStatus(msg.text);
      setButtons(false);
    }
  };
</script>
