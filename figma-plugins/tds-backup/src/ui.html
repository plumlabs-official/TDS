<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>TDS Tools</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 12px;
      color: #333;
      padding: 16px;
      background: #fff;
    }

    h1 {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 16px;
      color: #00cc61;
    }

    .section {
      margin-bottom: 16px;
    }

    .section-title {
      font-size: 11px;
      font-weight: 600;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }

    button {
      width: 100%;
      padding: 10px 12px;
      margin-bottom: 8px;
      border: none;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn-primary {
      background: #00cc61;
      color: white;
    }

    .btn-primary:hover:not(:disabled) {
      background: #00b356;
    }

    .btn-secondary {
      background: #f3f3f3;
      color: #333;
    }

    .btn-secondary:hover:not(:disabled) {
      background: #e6e6e6;
    }

    .status {
      font-size: 11px;
      color: #666;
      text-align: center;
      padding: 8px;
    }

    /* Rename Preview */
    .preview-container {
      display: none;
      margin-top: 8px;
    }

    .preview-container.active {
      display: block;
    }

    .preview-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    .preview-header span {
      font-size: 11px;
      color: #666;
    }

    .preview-list {
      max-height: 240px;
      overflow-y: auto;
      border: 1px solid #eee;
      border-radius: 6px;
    }

    .preview-item {
      padding: 6px 8px;
      border-bottom: 1px solid #f5f5f5;
      font-size: 11px;
    }

    .preview-item:last-child {
      border-bottom: none;
    }

    .preview-before {
      color: #999;
      text-decoration: line-through;
    }

    .preview-after {
      color: #00cc61;
      font-weight: 500;
    }

    .preview-reason {
      color: #888;
      font-size: 10px;
      margin-top: 2px;
    }

    .issue-item {
      padding: 6px 8px;
      border-bottom: 1px solid #f5f5f5;
      font-size: 11px;
    }

    .issue-severity {
      display: inline-block;
      font-size: 10px;
      font-weight: 600;
      padding: 1px 4px;
      border-radius: 3px;
      margin-right: 4px;
    }

    .severity-major { background: #fee2e2; color: #dc2626; }
    .severity-minor { background: #fef9c3; color: #ca8a04; }
    .severity-warning { background: #f3f4f6; color: #6b7280; }

    .wrapper-section {
      margin-top: 8px;
      border-top: 1px solid #eee;
      padding-top: 8px;
    }

    .wrapper-section-title {
      font-size: 11px;
      font-weight: 600;
      color: #ca8a04;
      margin-bottom: 4px;
    }

    .wrapper-item {
      padding: 4px 8px;
      font-size: 11px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .wrapper-item input[type="checkbox"] {
      margin: 0;
    }

    .wrapper-item .wrapper-label {
      color: #666;
    }

    .wrapper-item .wrapper-child {
      color: #ca8a04;
      font-weight: 500;
    }

    .btn-warning {
      background: #fef9c3;
      color: #92400e;
      border: 1px solid #fde68a;
    }

    .btn-warning:hover:not(:disabled) {
      background: #fde68a;
    }
  </style>
</head>
<body>
  <h1>TDS Tools</h1>

  <div class="section">
    <div class="section-title">Renamer</div>
    <button class="btn-primary" id="btn-rename-product">
      Rename (Product Design)
    </button>
    <button class="btn-secondary" id="btn-rename-tds">
      Rename (TDS Library)
    </button>
  </div>

  <div class="preview-container" id="preview-container">
    <div class="preview-header">
      <span id="preview-title">Preview</span>
      <button class="btn-primary" id="btn-apply-renames" style="width: auto; padding: 6px 12px; margin: 0;">
        Apply
      </button>
    </div>
    <div class="preview-list" id="preview-list"></div>
    <div class="wrapper-section" id="wrapper-section" style="display:none;">
      <div class="wrapper-section-title">Wrapper Warnings</div>
      <div id="wrapper-list"></div>
      <button class="btn-warning" id="btn-unwrap" style="width: auto; padding: 6px 12px; margin-top: 6px;">
        Unwrap Selected
      </button>
    </div>
  </div>

  <div class="status" id="status"></div>

  <script>
    // Button handlers
    document.getElementById('btn-rename-product').addEventListener('click', function() {
      parent.postMessage({ pluginMessage: { type: 'rename-product' } }, '*');
    });

    document.getElementById('btn-rename-tds').addEventListener('click', function() {
      parent.postMessage({ pluginMessage: { type: 'rename-tds' } }, '*');
    });

    document.getElementById('btn-apply-renames').addEventListener('click', function() {
      if (window._pendingEntries) {
        parent.postMessage({ pluginMessage: { type: 'apply-renames', entries: window._pendingEntries } }, '*');
        document.getElementById('preview-container').classList.remove('active');
        document.getElementById('wrapper-section').style.display = 'none';
        window._pendingEntries = null;
      }
    });

    document.getElementById('btn-unwrap').addEventListener('click', function() {
      var checkboxes = document.querySelectorAll('#wrapper-list input[type="checkbox"]:checked');
      var nodeIds = [];
      for (var i = 0; i < checkboxes.length; i++) {
        nodeIds.push(checkboxes[i].getAttribute('data-node-id'));
      }
      if (nodeIds.length > 0) {
        parent.postMessage({ pluginMessage: { type: 'unwrap-wrappers', nodeIds: nodeIds } }, '*');
        document.getElementById('wrapper-section').style.display = 'none';
      }
    });

    // Message handler from plugin
    window.onmessage = function(event) {
      var msg = event.data.pluginMessage;
      if (!msg) return;

      if (msg.type === 'rename-preview') {
        showPreview(msg);
      }
    };

    function showPreview(msg) {
      var container = document.getElementById('preview-container');
      var list = document.getElementById('preview-list');
      var title = document.getElementById('preview-title');
      var applyBtn = document.getElementById('btn-apply-renames');

      list.innerHTML = '';

      if (msg.mode === 'product') {
        var warnCount = (msg.wrapperWarnings && msg.wrapperWarnings.length) || 0;
        title.textContent = msg.entries.length + ' changes (' + msg.skipped + ' TDS skipped)';
        window._pendingEntries = msg.entries;
        applyBtn.style.display = 'inline-block';

        for (var i = 0; i < msg.entries.length; i++) {
          var entry = msg.entries[i];
          var item = document.createElement('div');
          item.className = 'preview-item';
          item.innerHTML =
            '<div class="preview-before">' + escapeHtml(entry.before) + '</div>' +
            '<div class="preview-after">' + escapeHtml(entry.after) + '</div>' +
            '<div class="preview-reason">' + escapeHtml(entry.reason) + '</div>';
          list.appendChild(item);
        }

        // Wrapper warnings
        var wrapperSection = document.getElementById('wrapper-section');
        var wrapperList = document.getElementById('wrapper-list');
        wrapperList.innerHTML = '';
        if (warnCount > 0) {
          for (var j = 0; j < msg.wrapperWarnings.length; j++) {
            var warn = msg.wrapperWarnings[j];
            var wItem = document.createElement('div');
            wItem.className = 'wrapper-item';
            wItem.innerHTML =
              '<input type="checkbox" checked data-node-id="' + escapeHtml(warn.nodeId) + '">' +
              '<span class="wrapper-label">' + escapeHtml(warn.nodeName) + ' → </span>' +
              '<span class="wrapper-child">' + escapeHtml(warn.childName) + ' 직접 배치</span>';
            wrapperList.appendChild(wItem);
          }
          wrapperSection.style.display = 'block';
        } else {
          wrapperSection.style.display = 'none';
        }
      } else if (msg.mode === 'library') {
        var total = msg.entries.length + (msg.propertyIssues ? msg.propertyIssues.length : 0);
        title.textContent = total + ' issues found';
        applyBtn.style.display = 'none';

        // Rename entries
        for (var i = 0; i < msg.entries.length; i++) {
          var entry = msg.entries[i];
          var item = document.createElement('div');
          item.className = 'preview-item';
          item.innerHTML =
            '<div class="preview-before">' + escapeHtml(entry.before) + '</div>' +
            '<div class="preview-after">' + escapeHtml(entry.after) + '</div>' +
            '<div class="preview-reason">' + escapeHtml(entry.reason) + '</div>';
          list.appendChild(item);
        }

        // Property issues
        if (msg.propertyIssues) {
          for (var i = 0; i < msg.propertyIssues.length; i++) {
            var issue = msg.propertyIssues[i];
            var item = document.createElement('div');
            item.className = 'issue-item';
            var severityClass = 'severity-' + issue.severity;
            item.innerHTML =
              '<span class="issue-severity ' + severityClass + '">' + issue.severity + '</span>' +
              '<strong>' + escapeHtml(issue.nodeName) + '</strong>: ' +
              escapeHtml(issue.property) + '<br>' +
              '<span style="color:#999">' + escapeHtml(issue.current) + '</span> → ' +
              '<span style="color:#00cc61">' + escapeHtml(issue.suggested) + '</span>';
            list.appendChild(item);
          }
        }
      }

      container.classList.add('active');
    }

    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }
  </script>
</body>
</html>
